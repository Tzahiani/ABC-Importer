# Builds the web app and deploys to GitHub Pages (static hosting).
# Repo → Settings → Pages: set source to "GitHub Actions", then push to main.

name: Deploy web (GitHub Pages)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install
        run: npm ci

      # Optional visit stats: add repo secrets VITE_STATS_INGEST_URL and VITE_STATS_READER_URL (see tools/stats-counter-worker.js).
      - name: Build (with base path for project site)
        run: npm run build:web
        env:
          VITE_BASE_PATH: /ABC-Importer/
          VITE_STATS_INGEST_URL: ${{ secrets.VITE_STATS_INGEST_URL }}
          VITE_STATS_READER_URL: ${{ secrets.VITE_STATS_READER_URL }}

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
